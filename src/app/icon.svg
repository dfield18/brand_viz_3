<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Radar rings -->
  <circle cx="16" cy="16" r="10" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
  <circle cx="16" cy="16" r="6.5" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
  <circle cx="16" cy="16" r="3" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.7" fill="none"/>
  <!-- Crosshairs -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#3b82f6" stroke-width="0.75" stroke-opacity="0.2"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#3b82f6" stroke-width="0.75" stroke-opacity="0.2"/>
  <!-- Sweep line -->
  <line x1="16" y1="16" x2="24" y2="9" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Data points -->
  <circle cx="19.5" cy="12" r="1.5" fill="#34d399"/>
  <circle cx="12" cy="13.5" r="1.2" fill="#fbbf24"/>
  <circle cx="20" cy="19" r="1" fill="#60a5fa"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#3b82f6"/>
</svg>
