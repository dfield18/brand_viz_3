<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Radar rings -->
  <circle cx="16" cy="16" r="10" stroke="#fff" stroke-width="1.5" stroke-opacity="0.25" fill="none"/>
  <circle cx="16" cy="16" r="6.5" stroke="#fff" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
  <circle cx="16" cy="16" r="3" stroke="#fff" stroke-width="1.5" stroke-opacity="0.55" fill="none"/>
  <!-- Crosshairs -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#fff" stroke-width="0.75" stroke-opacity="0.15"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#fff" stroke-width="0.75" stroke-opacity="0.15"/>
  <!-- Sweep line -->
  <line x1="16" y1="16" x2="24" y2="9" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Data points -->
  <circle cx="19.5" cy="12" r="1.5" fill="#34d399"/>
  <circle cx="12" cy="13.5" r="1.2" fill="#fde68a"/>
  <circle cx="20" cy="19" r="1" fill="#fff"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#fff"/>
</svg>
